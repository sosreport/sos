name: Py Tests

on:
  workflow_call:
    inputs:
      py_version:
        required: true
        type: string

jobs:
  test:
    name: ${{ inputs.test_name }} Test
    runs-on: "ubuntu-latest"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.py_version }}
          check-latest: true
          pip-install: "-r requirements.txt"

      - name: Run sos
        run: |
          sudo ./bin/sos report --batch
