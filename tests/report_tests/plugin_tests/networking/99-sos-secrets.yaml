network:
  version: 2
  ethernets:
    eth0:
      dhcp4: true
      auth:
        key-management: "eap"
        method: "tls"
        identity: "an8021xidentity"
        anonymous-identity: "an8021xanonid"
        password: "an8021xpassword"
        client-key-password: "aclientkeypass"
        ca-certificate: /etc/ssl/certs/ca.pem
        client-certificate: /etc/ssl/certs/client.pem
        client-key: /etc/ssl/private/client.key
  tunnels:
    wg0:
      mode: wireguard
      key: "aWGPrivateKeyBase64=="
      port: 51820
      addresses: [10.10.0.1/24]
      peers:
        - endpoint: 198.51.100.1:51820
          allowed-ips: [10.10.0.0/24]
          keys:
            public: "aPeerPublicKeyBase64=="
            shared: "aPresharedKeyBase64=="
    gre0:
      mode: gre
      local: 192.0.2.1
      remote: 198.51.100.1
      key: 31337
